<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form assessment</title>
</head>
<body>
   <h1>Course sign up</h1>
   <form>
   <p>Please note firstname,lastname,,Email are required</p>
   First name: <input type="text"placeholder="Firstname" required><br><br>
   Last name : <input type="text" placeholder="Last name required"><br><br>
   Email: <input type="email" placeholder="Email" required><br><br>
   Password: <input type="password" placeholder="password" required><br><br>
   <p>are you above the age 18 ?</p>
   <input type="radio" id="Yes" name="age">
   <label for="Yes">Yes</label>
   
   <input type="radio" id="No" name="age">
   <label for="No">No</label>
   
   <p>Do you have a credit card or PayPal ??</p>
   <select>
       <option value="Credit">Credit card</option>
       
       <option value="PayPal">PayPal</option>
       
   </select><br><br>
   
   <input type="submit">
   </form>
</body>
</html>
